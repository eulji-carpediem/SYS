<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        body {
            margin: 0;
        }

        .box {
            position: absolute;
            width: 250px;
            height: 225px;
            left: 16px;
            top: 16px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            width: 100%;
            height: 150px;
            background: #FFB9B9;
            border-radius: 8px 8px 0 0;
        }

        .content {
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            padding: 6px 8px;
            gap: 8px;
            width: 100%;
            height: 75px;
            background: #FFFFFF;
            border-width: 0 1px 1px 1px;
            border-style: solid;
            border-color: #FFB9B9;
        }

        .text {
            font-family: 'Inter';
            font-weight: 400;
            font-size: 12px;
            line-height: 15px;
            color: #000000;
        }

        .info {
            display: flex;
            flex-direction: row;
            align-items: center;
            padding: 8px 0;
            gap: 8px;
            width: auto;
            height: 40px;
        }

        .circle {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #D9D9D9;
        }
    </style>
</head>

<body>
    <div class="box">
        <div class="header"></div>
        <div class="content">
            <div class="text">안녕하세요. 텍스트입니다.</div>
            <div class="info">
                <div class="circle"></div>
                <div class="text">휴양죠</div>
            </div>
        </div>
    </div>
</body>

</html>
