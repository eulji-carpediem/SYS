<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0;
        }

        .box {
            position: absolute;
            width: 320px;
            height: 320px;
            left: 16px;
            top: 16px;
            overflow: hidden;
            border-radius: 8px;
        }

        .image {
            position: absolute;
            width: 564px;
            height: 846px;
            left: -105px;
            top: -297px;
            background: url('./assets/img3.jpg') no-repeat center/cover;
        }

        .text {
            position: absolute;
            font-family: 'Inter';
            font-weight: 700;
            font-size: 24px;
            line-height: 29px;
            color: #FFFFFF;
        }

        .title {
            left: 16px;
            top: 16px;
            width: 161px;
            height: 29px;
        }
    </style>
</head>

<body>
    <div class="box">
        <div class="image"></div>
        <div class="text title">인테리어 디자인</div>
    </div>
</body>

</html>
