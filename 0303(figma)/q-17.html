<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
        }

        .box {
            position: absolute;
            width: 300px;
            height: 250px;
            left: 16px;
            top: 16px;
            background: #FFB9B9;
            border-radius: 8px;
            overflow: hidden;
        }

        .image {
            position: absolute;
            width: 338px;
            height: 450px;
            left: -38px;
            top: -87px;
            background: url('./assets/img4.jpg') no-repeat center/cover;
        }

        .overlay {
            position: absolute;
            width: 100%;
            height: 56px;
            left: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
        }

        .title {
            position: absolute;
            left: 8px;
            top: 8px;
            font-weight: 700;
            font-size: 12px;
            line-height: 15px;
            color: #FFFFFF;
        }

        .subtitle {
            position: absolute;
            left: 8px;
            top: 33px;
            font-weight: 700;
            font-size: 12px;
            line-height: 15px;
            color: #D1D1D1;
        }

        .circle {
            position: absolute;
            width: 24px;
            height: 24px;
            right: 16px;
            top: 16px;
            background: #D9D9D9;
            border-radius: 50%;
        }
    </style>
</head>

<body>
    <div class="box">
        <div class="image"></div>
        <div class="overlay">
            <div class="title">새로운 시작!</div>
            <div class="subtitle">김작가</div>
        </div>
        <div class="circle"></div>
    </div>
</body>

</html>
