<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container {
            position: absolute;
            width: 278px;
            height: 160px;
            left: 16px;
            top: 16px;
            background: #CA785C;
            border-radius: 8px;
            overflow: hidden;
        }

        .imgBox {
            position: absolute;
            width: 100%;
            height: 120px;
            top: 0;
            background: #FFFFFF;
            overflow: hidden;
        }

        .image {
            position: absolute;
            width: 298px;
            height: 298px;
            left: -20px;
            top: -89px;
            background: url('./assets/img1.jpg') center/cover no-repeat;
        }

        .txtBox {
            position: absolute;
            width: 278px;
            height: 40px;
            left: 0px;
            top: 120px;
        }

        .text {
            position: absolute;
            width: 79px;
            height: 19px;
            left: 16px;
            white-space: nowrap;
            top: calc(50% - 19px/2 - 0.5px);
            font-family: 'Inter';
            font-style: normal;
            font-weight: 700;
            font-size: 16px;
            line-height: 19px;
            color: #FFFFFF;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="imgBox">
            <div class="image"></div>
        </div>
        <div class="txtBox">
            <div class="text">안녕하세요!</div>
        </div>
    </div>
</body>

</html>
