<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0;
        }

        .box {
            position: absolute;
            width: 120px;
            height: 170px;
            left: 16px;
            top: 16px;
            background: #FFB9B9;
            border-radius: 8px;
        }

        .text {
            position: absolute;
            width: 104px;
            height: 30px;
            left: 24px;
            top: 194px;
            font-family: 'Inter';
            font-weight: 400;
            font-size: 12px;
            line-height: 15px;
            color: #000000;
        }

        .circle {
            position: absolute;
            width: 24px;
            height: 24px;
            left: 88px;
            top: 138px;
            background: #D9D9D9;
            border-radius: 50%;
        }
    </style>
</head>

<body>
    <div class="box"></div>
    <div class="circle"></div>
    <div class="text">나른한 점심시간, 밖에서 밥먹기</div>
</body>

</html>
