<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
        }

        .container {
            position: absolute;
            width: 310px;
            left: 16px;
            top: 16px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .title {
            font-weight: 700;
            font-size: 24px;
            line-height: 29px;
            color: #000000;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 278px;
        }

        .input-label {
            font-weight: 400;
            font-size: 16px;
            line-height: 19px;
            color: #000000;
        }

        .input-box {
            box-sizing: border-box;
            width: 100%;
            height: 40px;
            border: 1px solid #C3C3C3;
            border-radius: 8px;
            padding: 0 8px;
            font-size: 14px;
        }

        .login-button {
            width: 278px;
            height: 48px;
            background: #17B75E;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 20px;
            line-height: 24px;
            color: #FFFFFF;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="title">로그인</div>

        <div class="input-group">
            <label class="input-label">아이디</label>
            <input type="text" class="input-box" />
        </div>

        <div class="input-group">
            <label class="input-label">비밀번호</label>
            <input type="password" class="input-box" />
        </div>

        <div class="login-button">로그인</div>
    </div>
</body>

</html>
