<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0;
        }

        .container {
            position: absolute;
            width: 278px;
            height: 80px;
            left: 16px;
            top: 16px;
            background: #CA785C;
        }

        .text {
            position: absolute;
            font-family: 'Inter';
            font-weight: 700;
            color: #FFFFFF;
            font-style: normal;
            letter-spacing: -0.005em;

            width: 67px;
            height: 29px;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            line-height: 29px;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="text title">한여름</div>
    </div>
</body>

</html>
