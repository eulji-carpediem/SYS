<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container {
            position: relative;
        }

        .box {
            position: absolute;
            width: 278px;
            height: 160px;
            left: 16px;
            top: 16px;

            background: #CA785C;
            border-radius: 8px;
        }

        .text {
            position: absolute;
            width: 79px;
            height: 19px;
            left: 16px;
            top: 192px;
            white-space: nowrap;

            font-family: 'Inter';
            font-style: normal;
            font-weight: 600;
            font-size: 16px;
            line-height: 19px;

            color: #000000;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="box"></div>
        <div class="text">안녕하세요!</div>
    </div>
</body>

</html>
