<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0;
        }

        .box {
            position: absolute;
            width: 320px;
            height: 80px;
            left: 16px;
            top: 16px;
            box-sizing: border-box;
            background: #CA785C;

            display: flex;
            align-items: center;
            padding-left: 16px;
            gap: 30px;
        }

        .text {
            font-family: 'Inter';
            font-weight: 700;
            font-size: 24px;
            line-height: 29px;
            color: #FFFFFF;
        }
    </style>
</head>

<body>
    <div class="box">
        <div class="text">봄</div>
        <div class="text">여름</div>
        <div class="text">가을</div>
        <div class="text">겨울</div>
    </div>
</body>

</html>
