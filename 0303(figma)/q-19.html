<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            padding: 8px 16px;
            gap: 16px;

            position: absolute;
            width: 297px;
            height: 35px;
            left: 16px;
            top: 16px;

            background: #FFB9B9;
            border-radius: 4px;
        }

        .item {
            font-family: 'Inter';
            font-weight: 700;
            font-size: 16px;
            line-height: 19px;
            color: #FFFFFF;
            white-space: nowrap;
        }

        .dot {
            width: 4px;
            height: 4px;
            background: #D9D9D9;
            border-radius: 50%;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="item">웹툰홈</div>
        <div class="dot"></div>
        <div class="item">요일별웹툰</div>
        <div class="dot"></div>
        <div class="item">베스트도전</div>
    </div>
</body>

</html>
